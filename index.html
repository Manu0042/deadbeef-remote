<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fde4cf">
<meta name="theme-color" content="#fde4cf" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#fde4cf" media="(prefers-color-scheme: dark)">
<meta name="color-scheme" content="light">
<title>DeaDBeeF Remote</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root {
    /* Surfaces — warm pale orange background, slight tonal steps for elevation */
    --bg:         #fde4cf;
    --surface-1:  #fbd9bd;
    --surface-2:  #f6caa3;
    --surface-3:  #efb888;
    /* Text — warm dark brown, three steps for hierarchy */
    --fg:         #2a1a0c;
    --fg-dim:     #6b4d35;
    --fg-mute:    #a07854;
    /* Brand accent — saturated orange that reads on the pale background */
    --accent:     #e8590c;
    --accent-2:   #c2410c;
    --accent-soft: rgba(232, 89, 12, .14);
    /* Status */
    --ok:         #15803d;
    --err:        #b91c1c;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { color-scheme: light; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    user-select: none;
  }
  body {
    display: flex; flex-direction: column;
    min-height: 100vh; min-height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* Header — minimal, centered title in the brand color */
  header {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px 18px 6px;
    background: transparent;
  }
  header h1 {
    font-size: 16px; font-weight: 700; margin: 0;
    color: var(--fg);
    letter-spacing: -.2px;
  }

  /* Generic icon button — borderless, ripple-free, square-ish hit target */
  .icon-btn {
    background: transparent; border: 0; color: var(--fg);
    width: 48px; height: 48px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 22px;
    transition: background-color .15s ease, transform .1s ease;
  }
  .icon-btn:active { background: var(--surface-2); transform: scale(.94); }

  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Now-playing card — generous padding, no border, soft separation via background */
  .now-playing {
    padding: 8px 22px 18px;
    display: flex; flex-direction: column; gap: 18px;
    flex: 0 0 auto;
  }
  @media (max-height: 700px) {
    .artwork { max-width: 32vh; }
    .now-playing { gap: 10px; padding: 6px 18px 12px; }
  }

  .artwork {
    position: relative;
    width: 100%; aspect-ratio: 1/1;
    max-width: 100%;
    margin: 0 auto;
    background: var(--surface-2); border-radius: 16px;
    background-size: cover; background-position: center; background-repeat: no-repeat;
    display: flex; align-items: center; justify-content: center;
    color: var(--fg-mute); font-size: 56px;
    box-shadow:
      0 4px 8px rgba(74, 33, 5, .18),
      0 18px 32px rgba(74, 33, 5, .28),
      0 30px 60px rgba(74, 33, 5, .22);
  }
  .art-glyph { line-height: 1; opacity: .5; }
  .artwork.has-art .art-glyph { display: none; }
  .art-format {
    position: absolute; top: 10px; left: 10px;
    padding: 4px 9px; border-radius: 999px;
    background: rgba(42, 26, 12, .82);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fde4cf;
    font-size: 10px; font-weight: 700;
    letter-spacing: .4px;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
  }
  .art-format:empty { display: none; }
  @media (min-width: 600px) {
    .artwork { max-width: min(420px, 50vh); }
  }

  .meta { text-align: center; padding: 0 4px; }
  .title {
    font-size: 18px; font-weight: 700; line-height: 1.3;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    letter-spacing: -.2px;
  }
  .artist {
    color: var(--fg-dim); font-size: 13px; margin-top: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* Seek bar — slim track, prominent thumb, gradient fill */
  .seek { display: flex; flex-direction: column; gap: 6px; }
  .seek input[type=range] { width: 100%; }
  .times {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--fg-mute);
    font-variant-numeric: tabular-nums;
    letter-spacing: .3px;
  }

  /* The track is the visible 3 px bar; we still inflate the input height for touch comfort. */
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    background: transparent;
    outline: none;
    margin: 0;
  }
  .seek input[type=range] {
    height: 24px;
    padding: 10px 0;
  }
  /* Track */
  .seek input[type=range]::-webkit-slider-runnable-track {
    height: 3px; border-radius: 2px;
    background: var(--surface-3);
  }
  .seek input[type=range]::-moz-range-track {
    height: 3px; border-radius: 2px;
    background: var(--surface-3);
    border: 0;
  }
  /* Thumb */
  .seek input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    margin-top: -5.5px;
    box-shadow: 0 2px 6px rgba(74, 33, 5, .35);
    transition: transform .12s ease;
  }
  .seek input[type=range]:active::-webkit-slider-thumb { transform: scale(1.4); }
  .seek input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 0;
    box-shadow: 0 2px 6px rgba(74, 33, 5, .35);
  }

  /* Transport — flat icon-only buttons, no colored play disc */
  .transport {
    display: flex; align-items: center; justify-content: center;
    gap: 24px; padding: 4px 0 2px;
  }
  .transport .icon-btn { width: 56px; height: 56px; font-size: 28px; color: var(--fg-dim); }
  .transport .icon-btn:active { color: var(--fg); }
  .transport .play {
    width: 72px; height: 72px; font-size: 38px;
    color: var(--accent);
  }
  .transport .play:active { color: var(--accent-2); transform: scale(.96); }

  /* Library — two-view container that toggles between folder list and tracks list */
  .library {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .lib-header {
    position: relative;
    display: flex; align-items: center;
    padding: 10px 14px 6px;
    flex: 0 0 auto;
    min-height: 52px;
  }
  .lib-header h2 {
    /* Shown on the folders view only — hidden in the tracks view to give the
       album back its breathing room (and avoid clashing with the back button). */
    display: none;
    position: absolute; left: 0; right: 0;
    margin: 0; font-size: 14px; font-weight: 700;
    color: var(--fg);
    letter-spacing: .2px;
    text-align: center;
    pointer-events: none;
    padding: 0 52px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .library:not(.view-tracks) .lib-header h2 { display: block; }
  .back-btn {
    width: 36px; height: 36px;
    color: var(--fg-dim);
    flex: 0 0 auto;
    position: relative; z-index: 1;
    visibility: hidden; /* shown only in the tracks view */
  }
  .back-btn:active { color: var(--fg); }
  .library.view-tracks .back-btn { visibility: visible; }

  .folders, .items {
    flex: 1; min-height: 0;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 4px 0 12px;
  }
  /* Only one of the two panels is shown at a time */
  .library:not(.view-tracks) .items   { display: none; }
  .library.view-tracks      .folders { display: none; }

  .folder {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    padding: 12px 18px;
    cursor: pointer;
    min-height: 56px;
    position: relative;
    transition: background-color .12s ease;
  }
  .folder:active { background: var(--surface-1); }
  .folder.current::before {
    content: ''; position: absolute;
    left: 0; top: 8px; bottom: 8px; width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
    border-radius: 0 2px 2px 0;
  }
  .folder.current .folder-name { color: var(--accent); }
  .folder-text { min-width: 0; max-width: 100%; text-align: center; }
  .folder-name {
    font-size: 15px; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .folder-artist {
    font-size: 12px; color: var(--fg-dim); margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  /* Count + chevron hidden so the name is visually centered. The data is still
     in the DOM in case we want to bring them back later. */
  .folder-count, .folder-chevron { display: none; }

  /* Items list — no row borders, generous padding, accent treatment for the playing track */
  .item {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    padding: 10px 18px;
    cursor: pointer;
    min-height: 56px;
    position: relative;
    transition: background-color .12s ease;
  }
  .item:active { background: var(--surface-1); }
  .item.playing::before {
    content: ''; position: absolute;
    left: 0; top: 8px; bottom: 8px; width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
    border-radius: 0 2px 2px 0;
  }
  .item.playing .item-title { color: var(--accent); }
  /* Track number and length hidden so the title/artist are visually centered.
     The data is still in the DOM in case we want to bring them back later. */
  .item-num, .item-len { display: none; }
  .item-text { min-width: 0; max-width: 100%; text-align: center; }
  .item-title {
    font-size: 14px; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .item-sub {
    font-size: 12px; color: var(--fg-dim); margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .empty {
    padding: 40px 20px; text-align: center;
    color: var(--fg-mute); font-size: 13px;
  }

  .err-banner {
    display: none;
    margin: 6px 18px 0;
    padding: 9px 14px; border-radius: 10px;
    background: rgba(185, 28, 28, .12);
    color: var(--err); font-size: 12px; text-align: center;
    border: 1px solid rgba(185, 28, 28, .25);
  }
  .err-banner.show { display: block; }
</style>
</head>
<body>

<header>
  <h1>DeaDBeeF Remote</h1>
</header>

<div class="err-banner" id="errBanner"></div>

<main>
  <section class="now-playing">
    <div class="artwork" id="artwork"><span class="art-glyph">♪</span><span class="art-format" id="artFormat"></span></div>
    <div class="meta">
      <div class="title" id="trackTitle">—</div>
      <div class="artist" id="trackArtist">Non connecté</div>
    </div>
    <div class="seek">
      <input type="range" id="seekBar" min="0" max="1000" value="0" step="1">
      <div class="times">
        <span id="timePos">0:00</span>
        <span id="timeDur">0:00</span>
      </div>
    </div>
    <div class="transport">
      <button class="icon-btn" id="btnPrev" aria-label="Précédent">
        <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
          <path fill="currentColor" d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </button>
      <button class="icon-btn play" id="btnPlay" aria-label="Lecture/Pause">
        <svg viewBox="0 0 24 24" width="40" height="40" aria-hidden="true">
          <path fill="currentColor" d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <button class="icon-btn" id="btnNext" aria-label="Suivant">
        <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
          <path fill="currentColor" d="M6 18l8.5-6L6 6zM16 6h2v12h-2z"/>
        </svg>
      </button>
    </div>
  </section>

  <section class="library" id="library">
    <header class="lib-header" id="libHeader">
      <button class="icon-btn back-btn" id="btnBack" aria-label="Retour">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path fill="currentColor" d="M15.5 19 8 11.5 15.5 4l1.4 1.4-6.1 6.1 6.1 6.1z"/>
        </svg>
      </button>
      <h2 id="libTitle">Albums</h2>
    </header>
    <div class="folders" id="folders"></div>
    <div class="items" id="items">
      <div class="empty">Playlist vide.</div>
    </div>
  </section>
</main>

<script>
'use strict';

// ---------- Config ----------
const SERVER_URL = 'http://192.168.1.21:8880';
const COLS_TRACK = '%artist%,%title%,%album%,%length%,%samplerate%,%bitspersample%,%channels%,%codec%';
const COLS_ITEM  = '%tracknumber%,%title%,%artist%,%album%,%length%,%length_seconds%,%path%';
const POLL_MS = 1000;

let lastState = null;
let sourcePlaylistId = null;
let dirGroups = []; // [{dir, items: [{columns, originalIndex}]}, ...]
let activeDirIdx = 0;
let userSeeking = false;
let pollTimer = null;

// ---------- Helpers ----------
const $ = (id) => document.getElementById(id);
const fmtTime = (s) => {
  if (!isFinite(s) || s < 0) return '0:00';
  s = Math.floor(s);
  const m = Math.floor(s / 60), sec = s % 60;
  if (m >= 60) {
    const h = Math.floor(m / 60), mm = m % 60;
    return `${h}:${String(mm).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
  }
  return `${m}:${String(sec).padStart(2, '0')}`;
};
const setBanner = (msg) => {
  const b = $('errBanner');
  if (msg) { b.textContent = msg; b.classList.add('show'); }
  else b.classList.remove('show');
};

// ---------- API client ----------
async function api(path, { method = 'GET', body, signal } = {}) {
  const url = SERVER_URL + path;
  const opts = { method, signal, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  if (r.status === 204) return null;
  const ct = r.headers.get('content-type') || '';
  return ct.includes('application/json') ? r.json() : r;
}

const Player = {
  state: () => api(`/api/player?columns=${encodeURIComponent(COLS_TRACK)}`),
  // Safe toggle: pause↔play, no-op if stopped (avoids /play-pause which restarts from 0 when stopped).
  playPause: () => api('/api/player/pause/toggle', { method: 'POST' }),
  // Explicit, deterministic — used by the seek pause/resume flow so we never
  // depend on the server's state at toggle time.
  play: () => api('/api/player/play', { method: 'POST' }),
  pause: () => api('/api/player/pause', { method: 'POST' }),
  stop: () => api('/api/player/stop', { method: 'POST' }),
  next: () => api('/api/player/next', { method: 'POST' }),
  prev: () => api('/api/player/previous', { method: 'POST' }),
  playItem: (plId, idx) => api(`/api/player/play/${encodeURIComponent(plId)}/${idx}`, { method: 'POST' }),
  seek: (pos) => api('/api/player', { method: 'POST', body: { position: pos } }),
};

const Playlists = {
  list: () => api('/api/playlists'),
  items: (plId, offset, count) =>
    api(`/api/playlists/${encodeURIComponent(plId)}/items/${offset}:${count}?columns=${encodeURIComponent(COLS_ITEM)}`),
};

// ---------- Web artwork fallback (iTunes → Cover Art Archive) ----------
const WebArt = (() => {
  const CACHE_KEY = 'beefweb.webart.v1';
  const NEG = '__none__'; // sentinel for "we searched and found nothing"
  let cache = {};
  try { cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); } catch {}

  const save = () => {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch {}
  };
  const norm = (s) => String(s || '').trim().toLowerCase();
  const key = (artist, album) => `${norm(artist)}|${norm(album)}`;

  async function fromItunes(artist, album) {
    const term = encodeURIComponent(`${artist} ${album}`);
    const url = `https://itunes.apple.com/search?term=${term}&entity=album&limit=1`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const j = await r.json();
    const hit = j.results && j.results[0];
    if (!hit || !hit.artworkUrl100) return null;
    // Upscale: iTunes serves 100×100 by default; replace with 600×600
    return hit.artworkUrl100.replace(/\/\d+x\d+bb\.(jpg|png)$/i, '/600x600bb.$1');
  }

  async function fromCoverArtArchive(artist, album) {
    const q = encodeURIComponent(`artist:"${artist}" AND release:"${album}"`);
    const sr = await fetch(
      `https://musicbrainz.org/ws/2/release/?query=${q}&fmt=json&limit=1`
    );
    if (!sr.ok) return null;
    const sj = await sr.json();
    const rel = sj.releases && sj.releases[0];
    if (!rel || !rel.id) return null;
    // CAA returns 307 to archive.org; the browser follows. Use the front-500 alias.
    return `https://coverartarchive.org/release/${rel.id}/front-500`;
  }

  async function lookup(artist, album) {
    if (!artist || !album) return null;
    const k = key(artist, album);
    if (k in cache) {
      const v = cache[k];
      return v === NEG ? null : v;
    }
    let url = null;
    try { url = await fromItunes(artist, album); } catch {}
    if (!url) {
      try { url = await fromCoverArtArchive(artist, album); } catch {}
    }
    cache[k] = url || NEG;
    save();
    return url;
  }

  return { lookup };
})();

// Set artwork: try beefweb first, fall back to web search if it 404s.
async function resolveArtwork(plId, idx, artist, album, trackKey) {
  const art = $('artwork');
  const beefUrl = SERVER_URL + `/api/artwork/${encodeURIComponent(plId)}/${idx}`;

  // Probe with an Image() so we don't paint a broken image first.
  const ok = await new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(true);
    img.onerror = () => resolve(false);
    img.src = beefUrl;
  });

  // Track may have changed while we were probing
  if (art.dataset.key !== trackKey) return;

  if (ok) {
    art.style.backgroundImage = `url("${beefUrl}")`;
    art.classList.add('has-art');
    return;
  }

  // No embedded artwork → try the web
  art.classList.remove('has-art');
  art.style.backgroundImage = '';
  const webUrl = await WebArt.lookup(artist, album);
  if (art.dataset.key !== trackKey) return;
  if (webUrl) {
    art.style.backgroundImage = `url("${webUrl}")`;
    art.classList.add('has-art');
  }
}

// ---------- Render ----------
// Build a short tag like "PCM · 96 kHz" or "DSD · 1bit · 2.8 MHz" from
// samplerate + bitspersample + codec.
//
// Notes on what beefweb/DeaDBeeF actually exposes:
//  - %bitspersample% is NOT a real DeaDBeeF title-formatting field, so bps
//    arrives as an empty string for everyone. We can only show "Xbit" when
//    we can infer it (DSD is always 1bit).
//  - %codec% returns the decoder name, not the file format: DSD files come
//    through as "dsd_lsbf_planar" / "dsd_msbf_planar" / etc., so we match on
//    a substring "dsd", not a word-boundary regex. As a backup, any sample
//    rate ≥ 1 MHz means it's DSD (DSD64 = 2.8224 MHz).
function formatAudioInfo(srStr, bpsStr, codec) {
  const sr = parseInt(srStr, 10);
  const bps = parseInt(bpsStr, 10);
  if (!sr) return '';

  const codecLc = String(codec || '').toLowerCase();
  const isDsd = sr >= 1_000_000 || /dsd|dsf|dff/.test(codecLc) || bps === 1;

  if (isDsd) {
    // DSD64 = 44100 × 64 = 2.8224 MHz, DSD128 = ×128, etc. The multiplier
    // already encodes both the bit depth (always 1) and the sample rate, so
    // we collapse the badge to just "DSD64" / "DSD128" / "DSD256" / "DSD512".
    const dsdMul = Math.round(sr / 44100);
    return `DSD${dsdMul}`;
  }

  // PCM: kHz, drop trailing .0 (44.1 stays, 96 doesn't become 96.0).
  // Bit depth is omitted because DeaDBeeF doesn't expose it.
  const khz = sr / 1000;
  const khzStr = Number.isInteger(khz) ? String(khz) : khz.toFixed(1);
  const bitPart = bps ? ` · ${bps}bit` : '';
  return `PCM${bitPart} · ${khzStr} kHz`;
}

function renderState(s) {
  if (!s || !s.player) return;
  const p = s.player;
  const ai = p.activeItem || {};
  const cols = ai.columns || [];
  const [artist, title, album, lengthStr, samplerate, bps, channels, codec] = cols;

  const isPlaying = p.playbackState === 'playing';
  const hasTrack = ai.index >= 0 && ai.duration > 0;

  // Play/pause icon. Two distinct SVG paths instead of Unicode glyphs — Android
  // sometimes renders ⏸ as a colored emoji square, and the path widths in the
  // ▶ glyph push it off-center.
  const ICON_PLAY  = '<svg viewBox="0 0 24 24" width="40" height="40" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>';
  const ICON_PAUSE = '<svg viewBox="0 0 24 24" width="40" height="40" aria-hidden="true"><path fill="currentColor" d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>';
  $('btnPlay').innerHTML = isPlaying ? ICON_PAUSE : ICON_PLAY;
  $('trackTitle').textContent = title || (hasTrack ? '(sans titre)' : '—');
  $('trackArtist').textContent = artist
    ? (album ? `${artist} — ${album}` : artist)
    : (p.playbackState === 'stopped' ? 'Arrêté' : '');

  // Artwork — bust cache when track changes
  const trackKey = `${ai.playlistId}:${ai.index}`;
  if (hasTrack) {
    if ($('artwork').dataset.key !== trackKey) {
      $('artwork').dataset.key = trackKey;
      resolveArtwork(ai.playlistId, ai.index, artist, album, trackKey);
    }
  } else {
    $('artwork').style.backgroundImage = '';
    $('artwork').dataset.key = '';
    $('artwork').classList.remove('has-art');
  }

  // Audio format badge
  $('artFormat').textContent = hasTrack ? formatAudioInfo(samplerate, bps, codec) : '';

  // Seek bar
  if (!userSeeking) {
    const dur = ai.duration || 0;
    const pos = ai.position || 0;
    $('seekBar').max = Math.max(1, Math.floor(dur));
    $('seekBar').value = Math.floor(pos);
    $('timePos').textContent = fmtTime(pos);
    $('timeDur').textContent = fmtTime(dur);
  }

  // Active playlist tracking — refresh items if the source playlist changed
  if (ai.playlistId && ai.playlistId !== lastState?.player?.activeItem?.playlistId) {
    if (sourcePlaylistId === null) refreshSource(ai.playlistId);
  }

  // Highlight playing item and folder. The track marker only matters in the
  // tracks view; the folder marker only matters in the folder list. On track
  // change, scroll the visible row into view (whichever view we're on).
  const prevAi = lastState?.player?.activeItem;
  const trackChanged = !prevAi || prevAi.playlistId !== ai.playlistId || prevAi.index !== ai.index;

  document.querySelectorAll('.item.playing').forEach(el => el.classList.remove('playing'));
  if (hasTrack && ai.playlistId === sourcePlaylistId) {
    const el = document.querySelector(`.item[data-orig-idx="${ai.index}"]`);
    if (el) {
      el.classList.add('playing');
      if (trackChanged) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }

  // Refresh the "current" folder marker if the playing dir might have changed.
  if (trackChanged && dirGroups.length) {
    const folders = $('folders');
    folders.querySelectorAll('.folder.current').forEach(el => el.classList.remove('current'));
    if (hasTrack && ai.playlistId === sourcePlaylistId) {
      const idx = dirGroups.findIndex(g => g.items.some(it => it.originalIndex === ai.index));
      if (idx >= 0 && folders.children[idx]) {
        folders.children[idx].classList.add('current');
      }
    }
  }

  lastState = s;
}

function renderFolders() {
  const wrap = $('folders');
  wrap.innerHTML = '';
  if (!dirGroups.length) {
    wrap.innerHTML = '<div class="empty">Playlist vide.</div>';
    return;
  }
  // Which group contains the currently-playing track (if any)?
  const ai = lastState?.player?.activeItem;
  const playingDir = (ai && ai.playlistId === sourcePlaylistId && ai.index >= 0)
    ? dirGroups.findIndex(g => g.items.some(it => it.originalIndex === ai.index))
    : -1;

  const CHEVRON = '<svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="m9 6 6 6-6 6z"/></svg>';
  const frag = document.createDocumentFragment();
  dirGroups.forEach((g, i) => {
    // Artist for the album = grandparent directory of any track in the group.
    // Filesystems are usually laid out as .../Artist/Album/track.flac, so the
    // dir two levels up matches the artist for both single-artist albums and
    // compilations (where %artist% would only show one performer).
    const path = g.items[0]?.columns[6] || '';
    const artist = grandparentDir(path);
    const div = document.createElement('div');
    div.className = 'folder' + (i === playingDir ? ' current' : '');
    div.innerHTML = `
      <div class="folder-text">
        <div class="folder-name">${escapeHtml(g.dir)}</div>
        ${artist ? `<div class="folder-artist">${escapeHtml(artist)}</div>` : ''}
      </div>
      <div class="folder-count">${g.items.length}</div>
      <div class="folder-chevron">${CHEVRON}</div>
    `;
    div.onclick = () => openFolder(i);
    frag.appendChild(div);
  });
  wrap.appendChild(frag);

  if (playingDir >= 0) {
    const el = wrap.children[playingDir];
    if (el) el.scrollIntoView({ block: 'center' });
  }
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function renderItems() {
  const list = $('items');
  const group = dirGroups[activeDirIdx];
  if (!group || !group.items.length) {
    list.innerHTML = '<div class="empty">Dossier vide.</div>';
    return;
  }
  const ai = lastState?.player?.activeItem;
  const activeOrigIdx = (ai && ai.playlistId === sourcePlaylistId) ? ai.index : -1;
  const frag = document.createDocumentFragment();
  group.items.forEach((it, i) => {
    const [trackNo, title, artist, album, lengthStr] = it.columns;
    const div = document.createElement('div');
    div.className = 'item' + (it.originalIndex === activeOrigIdx ? ' playing' : '');
    div.dataset.origIdx = it.originalIndex;
    div.innerHTML = `
      <div class="item-num">${escapeHtml(trackNo) || (i + 1)}</div>
      <div class="item-text">
        <div class="item-title">${escapeHtml(title) || '(sans titre)'}</div>
        <div class="item-sub">${escapeHtml(artist)}</div>
      </div>
      <div class="item-len">${escapeHtml(lengthStr)}</div>
    `;
    div.onclick = () => Player.playItem(sourcePlaylistId, it.originalIndex).catch(handleErr);
    frag.appendChild(div);
  });
  list.innerHTML = '';
  list.appendChild(frag);

  if (activeOrigIdx >= 0) {
    const el = list.querySelector(`.item[data-orig-idx="${activeOrigIdx}"]`);
    if (el) el.scrollIntoView({ block: 'center' });
  }
}

// ---------- Actions ----------
// Extract the immediate parent directory of a path. Handles both '/' and '\' so
// it works whether DeaDBeeF runs on Linux or Windows.
function parentDir(path) {
  if (!path) return '';
  const clean = String(path).replace(/^[a-z]+:\/\//i, '').replace(/[/\\]+$/, '');
  const m = clean.match(/[/\\]([^/\\]+)[/\\][^/\\]+$/);
  return m ? m[1] : '';
}

// Extract the grandparent directory (two levels up from the file). For a
// typical "/music/Artist/Album/track.flac" layout, this is the artist.
function grandparentDir(path) {
  if (!path) return '';
  const clean = String(path).replace(/^[a-z]+:\/\//i, '').replace(/[/\\]+$/, '');
  const m = clean.match(/[/\\]([^/\\]+)[/\\][^/\\]+[/\\][^/\\]+$/);
  return m ? m[1] : '';
}

// Group playlist items by parent directory, preserving original playlist order.
// Returns [{dir, items: [{columns, originalIndex}]}] in first-encounter order.
function groupByDir(items) {
  const map = new Map();
  items.forEach((it, idx) => {
    const path = it.columns[6] || ''; // %path% column (7th in COLS_ITEM)
    const dir = parentDir(path) || '(racine)';
    if (!map.has(dir)) map.set(dir, []);
    map.get(dir).push({ columns: it.columns, originalIndex: idx });
  });
  return Array.from(map, ([dir, items]) => ({ dir, items }));
}

async function refreshSource(preferredId) {
  try {
    const r = await Playlists.list();
    const all = r.playlists || [];
    if (!all.length) { dirGroups = []; renderFolders(); renderItems(); return; }
    const chosen =
      (preferredId && all.find(p => p.id === preferredId)) ||
      all.find(p => p.isCurrent) ||
      all[0];
    sourcePlaylistId = chosen.id;
    const count = Math.min(chosen.itemCount || 500, 5000);
    const items = count
      ? (await Playlists.items(sourcePlaylistId, 0, count)).playlistItems?.items || []
      : [];
    dirGroups = groupByDir(items);
    if (activeDirIdx >= dirGroups.length) activeDirIdx = 0;
    renderFolders();
    renderItems();
  } catch (e) { handleErr(e); }
}

// Open a folder: switch to the tracks view and render the dir's tracks.
function openFolder(idx) {
  if (idx < 0 || idx >= dirGroups.length) return;
  activeDirIdx = idx;
  $('library').classList.add('view-tracks');
  renderItems();
}

// Close the tracks view and return to the folder list.
function closeFolder() {
  $('library').classList.remove('view-tracks');
  renderFolders();
}

async function poll() {
  try {
    const s = await Player.state();
    setBanner('');
    renderState(s);
    if (sourcePlaylistId === null) await refreshSource();
  } catch (e) {
    setBanner(`Connexion impossible : ${e.message}`);
  }
}

function startPolling() {
  stopPolling();
  poll();
  pollTimer = setInterval(poll, POLL_MS);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function handleErr(e) {
  console.error(e);
  setBanner(e.message || String(e));
}

// ---------- Wire UI ----------
$('btnPlay').onclick = () => Player.playPause().catch(handleErr);
$('btnNext').onclick = () => Player.next().catch(handleErr);
$('btnPrev').onclick = () => Player.prev().catch(handleErr);

const seekBar = $('seekBar');
// Pause-while-dragging: if playback was active when the user grabs the bar,
// pause it explicitly so audio doesn't keep moving past the search target,
// then resume after the seek POST completes on release. We use the explicit
// /pause and /play endpoints (not the toggle) so the resume can never restart
// from zero — that bug happens with /play-pause when the player has gone idle.
let resumeAfterSeek = false;
const onSeekStart = () => {
  userSeeking = true;
  if (lastState?.player?.playbackState === 'playing') {
    resumeAfterSeek = true;
    Player.pause().catch(handleErr);
  }
};
const onSeekEnd = () => {
  Player.seek(parseFloat(seekBar.value))
    .then(() => {
      if (resumeAfterSeek) {
        resumeAfterSeek = false;
        return Player.play();
      }
    })
    .catch(handleErr)
    .finally(() => setTimeout(() => { userSeeking = false; }, 400));
};
seekBar.addEventListener('input', () => {
  $('timePos').textContent = fmtTime(parseFloat(seekBar.value));
});
seekBar.addEventListener('pointerdown', onSeekStart);
seekBar.addEventListener('pointerup', onSeekEnd);
seekBar.addEventListener('pointercancel', onSeekEnd);
seekBar.addEventListener('change', onSeekEnd);

// Back button — return from the tracks view to the folder list.
$('btnBack').onclick = closeFolder;

// Service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// First boot
startPolling();

// Pause polling entirely while the page is hidden (background tab, PWA in
// background, screen off). When it comes back, run one poll immediately for
// a snappy refresh and then resume the 1 Hz timer.
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    stopPolling();
  } else {
    startPolling();
  }
});
</script>
</body>
</html>
