<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<meta name="color-scheme" content="dark">
<title>DeaDBeeF Remote</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root {
    --bg: #121212;
    --bg2: #1e1e1e;
    --bg3: #2a2a2a;
    --fg: #eaeaea;
    --fg-dim: #9a9a9a;
    --accent: #d62828;
    --accent2: #f77f00;
    --ok: #4caf50;
    --err: #e53935;
    --border: #333;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
    user-select: none;
  }
  body {
    display: flex; flex-direction: column;
    min-height: 100vh; min-height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 16px; margin: 0; flex: 1; font-weight: 600; }
  .status { font-size: 11px; color: var(--fg-dim); display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--err); }
  .dot.ok { background: var(--ok); }
  .icon-btn {
    background: transparent; border: 0; color: var(--fg);
    width: 44px; height: 44px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px;
  }
  .icon-btn:active { background: var(--bg3); }

  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .now-playing {
    padding: 16px; display: flex; flex-direction: column; gap: 12px;
    background: linear-gradient(180deg, var(--bg2), var(--bg));
    flex: 0 0 auto;
  }
  /* On short screens (landscape phone, small windows), shrink artwork to keep the list usable */
  @media (max-height: 700px) {
    .artwork { max-width: 30vh; }
    .now-playing { gap: 8px; padding: 10px 16px; }
  }
  .artwork {
    width: 100%; aspect-ratio: 1/1;
    max-width: 100%;
    margin: 0 auto;
    background: var(--bg3); border-radius: 12px;
    background-size: contain; background-position: center; background-repeat: no-repeat;
    display: flex; align-items: center; justify-content: center;
    color: var(--fg-dim); font-size: 48px;
    box-shadow: 0 4px 18px rgba(0,0,0,.4);
  }
  /* Cap the artwork on wider screens (tablet, desktop) so it stays a sensible square */
  @media (min-width: 600px) {
    .artwork { max-width: min(420px, 50vh); }
  }
  .meta { text-align: center; }
  .title { font-size: 17px; font-weight: 600; line-height: 1.25;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .artist { color: var(--fg-dim); font-size: 14px; margin-top: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .seek { display: flex; flex-direction: column; gap: 4px; }
  .seek input[type=range] { width: 100%; }
  .times { display: flex; justify-content: space-between; font-size: 11px; color: var(--fg-dim); }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    height: 4px; background: var(--bg3); border-radius: 2px;
    outline: none;
  }
  /* Bigger touch surface for the seek bar */
  .seek input[type=range] {
    height: 22px;
    background: transparent;
    padding: 9px 0;
    background-clip: content-box;
    background-color: var(--bg3);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    border: 2px solid var(--bg);
  }
  input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    border: 2px solid var(--bg);
  }

  .transport { display: flex; align-items: center; justify-content: center; gap: 14px; }
  .transport .icon-btn { width: 56px; height: 56px; font-size: 24px; }
  .transport .play {
    width: 68px; height: 68px; font-size: 28px;
    background: var(--accent); color: white;
  }
  .transport .play:active { background: var(--accent2); }
  /* The ▶ glyph has visual whitespace on its right side that pushes it left of center;
     nudge it back. The ⏸ glyph is symmetric, so we only translate when in play state. */
  .transport .play.is-paused { padding-left: 4px; }

  .tabs {
    display: flex; justify-content: center;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    background: var(--bg2); overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto; padding: 14px 16px; font-size: 13px; color: var(--fg-dim);
    background: transparent; border: 0; cursor: pointer;
    border-bottom: 2px solid transparent;
    min-height: 44px;
  }
  .tab.active { color: var(--fg); border-bottom-color: var(--accent); }
  .tab .count { font-size: 11px; color: var(--fg-dim); margin-left: 4px; }

  .items { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer;
    min-height: 56px;
  }
  .item:active { background: var(--bg3); }
  .item.playing { background: rgba(214, 40, 40, .12); }
  .item.playing .item-title { color: var(--accent2); }
  .item-num { color: var(--fg-dim); font-size: 12px; min-width: 24px; text-align: right; font-variant-numeric: tabular-nums; }
  .item-text { flex: 1; min-width: 0; }
  .item-title { font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-sub { font-size: 12px; color: var(--fg-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-len { font-size: 12px; color: var(--fg-dim); font-variant-numeric: tabular-nums; }

  .empty { padding: 30px; text-align: center; color: var(--fg-dim); font-size: 14px; }

  .err-banner {
    display: none; padding: 8px 14px; background: rgba(229, 57, 53, .15);
    color: #ff8a80; font-size: 12px; text-align: center;
    border-bottom: 1px solid rgba(229, 57, 53, .3);
  }
  .err-banner.show { display: block; }
</style>
</head>
<body>

<header>
  <h1>DeaDBeeF Remote</h1>
  <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">…</span></div>
</header>

<div class="err-banner" id="errBanner"></div>

<main>
  <section class="now-playing">
    <div class="artwork" id="artwork">♪</div>
    <div class="meta">
      <div class="title" id="trackTitle">—</div>
      <div class="artist" id="trackArtist">Non connecté</div>
    </div>
    <div class="seek">
      <input type="range" id="seekBar" min="0" max="1000" value="0" step="1">
      <div class="times">
        <span id="timePos">0:00</span>
        <span id="timeDur">0:00</span>
      </div>
    </div>
    <div class="transport">
      <button class="icon-btn" id="btnPrev" aria-label="Précédent">⏮</button>
      <button class="icon-btn play" id="btnPlay" aria-label="Lecture/Pause">▶</button>
      <button class="icon-btn" id="btnNext" aria-label="Suivant">⏭</button>
    </div>
  </section>

  <nav class="tabs" id="tabs"></nav>
  <section class="items" id="items">
    <div class="empty">Connecte-toi pour voir les playlists.</div>
  </section>
</main>

<script>
'use strict';

// ---------- Config ----------
const SERVER_URL = 'http://192.168.1.21:8880';
const COLS_TRACK = '%artist%,%title%,%album%,%length%';
const COLS_ITEM  = '%tracknumber%,%title%,%artist%,%album%,%length%,%length_seconds%';
const POLL_MS = 1000;

let lastState = null;
let playlists = [];
let activePlaylistId = null;
let userSeeking = false;
let connected = false;
let pollTimer = null;

// ---------- Helpers ----------
const $ = (id) => document.getElementById(id);
const fmtTime = (s) => {
  if (!isFinite(s) || s < 0) return '0:00';
  s = Math.floor(s);
  const m = Math.floor(s / 60), sec = s % 60;
  if (m >= 60) {
    const h = Math.floor(m / 60), mm = m % 60;
    return `${h}:${String(mm).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
  }
  return `${m}:${String(sec).padStart(2, '0')}`;
};
const setBanner = (msg) => {
  const b = $('errBanner');
  if (msg) { b.textContent = msg; b.classList.add('show'); }
  else b.classList.remove('show');
};
const setStatus = (ok, text) => {
  $('statusDot').classList.toggle('ok', ok);
  $('statusText').textContent = text;
  connected = ok;
};

// ---------- API client ----------
async function api(path, { method = 'GET', body, signal } = {}) {
  const url = SERVER_URL + path;
  const opts = { method, signal, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  if (r.status === 204) return null;
  const ct = r.headers.get('content-type') || '';
  return ct.includes('application/json') ? r.json() : r;
}

const Player = {
  state: () => api(`/api/player?columns=${encodeURIComponent(COLS_TRACK)}`),
  play: () => api('/api/player/play-pause', { method: 'POST' }),
  stop: () => api('/api/player/stop', { method: 'POST' }),
  next: () => api('/api/player/next', { method: 'POST' }),
  prev: () => api('/api/player/previous', { method: 'POST' }),
  playItem: (plId, idx) => api(`/api/player/play/${encodeURIComponent(plId)}/${idx}`, { method: 'POST' }),
  seek: (pos) => api('/api/player', { method: 'POST', body: { position: pos } }),
};

const Playlists = {
  list: () => api('/api/playlists'),
  items: (plId, offset, count) =>
    api(`/api/playlists/${encodeURIComponent(plId)}/items/${offset}:${count}?columns=${encodeURIComponent(COLS_ITEM)}`),
};

// ---------- Web artwork fallback (iTunes → Cover Art Archive) ----------
const WebArt = (() => {
  const CACHE_KEY = 'beefweb.webart.v1';
  const NEG = '__none__'; // sentinel for "we searched and found nothing"
  let cache = {};
  try { cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); } catch {}

  const save = () => {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch {}
  };
  const norm = (s) => String(s || '').trim().toLowerCase();
  const key = (artist, album) => `${norm(artist)}|${norm(album)}`;

  async function fromItunes(artist, album) {
    const term = encodeURIComponent(`${artist} ${album}`);
    const url = `https://itunes.apple.com/search?term=${term}&entity=album&limit=1`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const j = await r.json();
    const hit = j.results && j.results[0];
    if (!hit || !hit.artworkUrl100) return null;
    // Upscale: iTunes serves 100×100 by default; replace with 600×600
    return hit.artworkUrl100.replace(/\/\d+x\d+bb\.(jpg|png)$/i, '/600x600bb.$1');
  }

  async function fromCoverArtArchive(artist, album) {
    const q = encodeURIComponent(`artist:"${artist}" AND release:"${album}"`);
    const sr = await fetch(
      `https://musicbrainz.org/ws/2/release/?query=${q}&fmt=json&limit=1`
    );
    if (!sr.ok) return null;
    const sj = await sr.json();
    const rel = sj.releases && sj.releases[0];
    if (!rel || !rel.id) return null;
    // CAA returns 307 to archive.org; the browser follows. Use the front-500 alias.
    return `https://coverartarchive.org/release/${rel.id}/front-500`;
  }

  async function lookup(artist, album) {
    if (!artist || !album) return null;
    const k = key(artist, album);
    if (k in cache) {
      const v = cache[k];
      return v === NEG ? null : v;
    }
    let url = null;
    try { url = await fromItunes(artist, album); } catch {}
    if (!url) {
      try { url = await fromCoverArtArchive(artist, album); } catch {}
    }
    cache[k] = url || NEG;
    save();
    return url;
  }

  return { lookup };
})();

// Set artwork: try beefweb first, fall back to web search if it 404s.
async function resolveArtwork(plId, idx, artist, album, trackKey) {
  const art = $('artwork');
  const beefUrl = SERVER_URL + `/api/artwork/${encodeURIComponent(plId)}/${idx}`;

  // Probe with an Image() so we don't paint a broken image first.
  const ok = await new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(true);
    img.onerror = () => resolve(false);
    img.src = beefUrl;
  });

  // Track may have changed while we were probing
  if (art.dataset.key !== trackKey) return;

  if (ok) {
    art.style.backgroundImage = `url("${beefUrl}")`;
    art.textContent = '';
    return;
  }

  // No embedded artwork → try the web
  art.textContent = '♪';
  art.style.backgroundImage = '';
  const webUrl = await WebArt.lookup(artist, album);
  if (art.dataset.key !== trackKey) return;
  if (webUrl) {
    art.style.backgroundImage = `url("${webUrl}")`;
    art.textContent = '';
  }
}

// ---------- Render ----------
function renderState(s) {
  if (!s || !s.player) return;
  const p = s.player;
  const ai = p.activeItem || {};
  const cols = ai.columns || [];
  const [artist, title, album, lengthStr] = cols;

  const isPlaying = p.playbackState === 'playing';
  const hasTrack = ai.index >= 0 && ai.duration > 0;

  $('btnPlay').textContent = isPlaying ? '⏸' : '▶';
  $('btnPlay').classList.toggle('is-paused', !isPlaying);
  $('trackTitle').textContent = title || (hasTrack ? '(sans titre)' : '—');
  $('trackArtist').textContent = artist
    ? (album ? `${artist} — ${album}` : artist)
    : (p.playbackState === 'stopped' ? 'Arrêté' : '');

  // Artwork — bust cache when track changes
  const trackKey = `${ai.playlistId}:${ai.index}`;
  if (hasTrack) {
    if ($('artwork').dataset.key !== trackKey) {
      $('artwork').dataset.key = trackKey;
      resolveArtwork(ai.playlistId, ai.index, artist, album, trackKey);
    }
  } else {
    $('artwork').style.backgroundImage = '';
    $('artwork').dataset.key = '';
    $('artwork').textContent = '♪';
  }

  // Seek bar
  if (!userSeeking) {
    const dur = ai.duration || 0;
    const pos = ai.position || 0;
    $('seekBar').max = Math.max(1, Math.floor(dur));
    $('seekBar').value = Math.floor(pos);
    $('timePos').textContent = fmtTime(pos);
    $('timeDur').textContent = fmtTime(dur);
  }

  // Active playlist tracking — refresh items if we changed
  if (ai.playlistId && ai.playlistId !== lastState?.player?.activeItem?.playlistId) {
    if (activePlaylistId === null) selectPlaylist(ai.playlistId);
  }

  // Highlight playing item if visible, and scroll it into view when the track changes
  const prevAi = lastState?.player?.activeItem;
  const trackChanged = !prevAi || prevAi.playlistId !== ai.playlistId || prevAi.index !== ai.index;
  document.querySelectorAll('.item.playing').forEach(el => el.classList.remove('playing'));
  if (hasTrack && ai.playlistId === activePlaylistId) {
    const el = document.querySelector(`.item[data-idx="${ai.index}"]`);
    if (el) {
      el.classList.add('playing');
      if (trackChanged) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }

  lastState = s;
}

function renderTabs() {
  const wrap = $('tabs');
  wrap.innerHTML = '';
  for (const pl of playlists) {
    const btn = document.createElement('button');
    btn.className = 'tab' + (pl.id === activePlaylistId ? ' active' : '');
    btn.innerHTML = `${escapeHtml(pl.title)}<span class="count">${pl.itemCount}</span>`;
    btn.onclick = () => selectPlaylist(pl.id);
    wrap.appendChild(btn);
  }
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function renderItems(items, activeIdx) {
  const list = $('items');
  if (!items || !items.length) {
    list.innerHTML = '<div class="empty">Playlist vide.</div>';
    return;
  }
  const frag = document.createDocumentFragment();
  items.forEach((it, i) => {
    const [trackNo, title, artist, album, lengthStr] = it.columns;
    const div = document.createElement('div');
    div.className = 'item' + (i === activeIdx ? ' playing' : '');
    div.dataset.idx = i;
    div.innerHTML = `
      <div class="item-num">${escapeHtml(trackNo) || (i + 1)}</div>
      <div class="item-text">
        <div class="item-title">${escapeHtml(title) || '(sans titre)'}</div>
        <div class="item-sub">${escapeHtml(artist)}${album ? ' — ' + escapeHtml(album) : ''}</div>
      </div>
      <div class="item-len">${escapeHtml(lengthStr)}</div>
    `;
    div.onclick = () => Player.playItem(activePlaylistId, i).catch(handleErr);
    frag.appendChild(div);
  });
  list.innerHTML = '';
  list.appendChild(frag);

  // Scroll the playing item into view after the list is rebuilt (e.g. when switching tabs to the active playlist)
  if (activeIdx >= 0) {
    const el = list.querySelector(`.item[data-idx="${activeIdx}"]`);
    if (el) el.scrollIntoView({ block: 'center' });
  }
}

// ---------- Actions ----------
async function refreshPlaylists() {
  try {
    const r = await Playlists.list();
    playlists = r.playlists || [];
    if (!activePlaylistId && playlists.length) {
      const cur = playlists.find(p => p.isCurrent) || playlists[0];
      activePlaylistId = cur.id;
    }
    renderTabs();
    if (activePlaylistId) await loadItems(activePlaylistId);
  } catch (e) { handleErr(e); }
}

async function selectPlaylist(id) {
  activePlaylistId = id;
  renderTabs();
  await loadItems(id);
}

async function loadItems(plId) {
  try {
    const pl = playlists.find(p => p.id === plId);
    const count = Math.min(pl?.itemCount || 500, 2000);
    const r = await Playlists.items(plId, 0, count);
    const items = r.playlistItems?.items || [];
    const ai = lastState?.player?.activeItem;
    const activeIdx = (ai && ai.playlistId === plId) ? ai.index : -1;
    renderItems(items, activeIdx);
  } catch (e) { handleErr(e); }
}

async function poll() {
  try {
    const s = await Player.state();
    setStatus(true, 'Connecté');
    setBanner('');
    renderState(s);
    if (!playlists.length) await refreshPlaylists();
  } catch (e) {
    setStatus(false, 'Hors ligne');
    setBanner(`Connexion impossible : ${e.message}`);
  }
}

function startPolling() {
  stopPolling();
  poll();
  pollTimer = setInterval(poll, POLL_MS);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function handleErr(e) {
  console.error(e);
  setBanner(e.message || String(e));
}

// ---------- Wire UI ----------
$('btnPlay').onclick = () => Player.play().catch(handleErr);
$('btnNext').onclick = () => Player.next().catch(handleErr);
$('btnPrev').onclick = () => Player.prev().catch(handleErr);

const seekBar = $('seekBar');
const onSeekStart = () => { userSeeking = true; };
const onSeekEnd = () => {
  Player.seek(parseFloat(seekBar.value)).catch(handleErr)
    .finally(() => setTimeout(() => { userSeeking = false; }, 400));
};
seekBar.addEventListener('input', () => {
  $('timePos').textContent = fmtTime(parseFloat(seekBar.value));
});
seekBar.addEventListener('pointerdown', onSeekStart);
seekBar.addEventListener('pointerup', onSeekEnd);
seekBar.addEventListener('pointercancel', onSeekEnd);
seekBar.addEventListener('change', onSeekEnd);

// Service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// First boot
startPolling();

// Re-poll faster after returning to foreground
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) poll();
});
</script>
</body>
</html>
